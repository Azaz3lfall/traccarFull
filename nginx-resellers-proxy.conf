# Proxy reverso para o Resellers Server (porta 3333)
# Inclua este bloco location dentro do server que serve o frontend (ex.: rast.rastreadorautoram.com.br).
#
# Assim, requisições para /api/resellers/* no domínio principal serão encaminhadas
# ao servidor de revendas, corrigindo o erro 404 no checkBuildStatus.
#
# Exemplo de uso dentro de um server { ... }:
#
#   include /caminho/para/traccar-custom/nginx-resellers-proxy.conf;
#
# Se o resellersServer rodar em outro host, altere proxy_pass para:
#   proxy_pass https://revendas.rastreadorautoram.com.br;

location /api/resellers {
    proxy_pass http://127.0.0.1:3333;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

location /api/upload {
    proxy_pass http://127.0.0.1:3333;
    proxy_http_version 1.1;
