# ──────────────────────────────────────────────────────────────────────
# vsftpd Configuration - Enhanced for File Integrity & Reliability
# ──────────────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────────────
# NETWORK SETTINGS
# ──────────────────────────────────────────────────────────────────────
listen=YES
listen_ipv6=NO
listen_address=0.0.0.0

# ──────────────────────────────────────────────────────────────────────
# USER AUTHENTICATION
# ──────────────────────────────────────────────────────────────────────
# Allow local users to login
local_enable=YES

# Enable upload and write permissions
write_enable=YES

# Allow chroot (lock user to their home directory)
chroot_local_user=YES

# Allow file uploads inside chroot directory
allow_writeable_chroot=YES

# Disable anonymous access
anonymous_enable=NO

# ──────────────────────────────────────────────────────────────────────
# PASSIVE MODE (for NAT/firewall compatibility)
# ──────────────────────────────────────────────────────────────────────
pasv_enable=YES
pasv_min_port=40000
pasv_max_port=40100
# Set your external IP if behind NAT (uncomment and set)
# pasv_address=YOUR_EXTERNAL_IP

# ──────────────────────────────────────────────────────────────────────
# TIMEOUT SETTINGS (prevent hanging transfers)
# ──────────────────────────────────────────────────────────────────────
# Idle session timeout (10 minutes)
idle_session_timeout=600

# Data connection timeout (2 minutes)
data_connection_timeout=120

# Accept timeout (1 minute)
accept_timeout=60

# Connect timeout (1 minute)
connect_timeout=60

# ──────────────────────────────────────────────────────────────────────
# FILE UPLOAD SETTINGS
# ──────────────────────────────────────────────────────────────────────
# File permissions for uploaded files
file_open_mode=0666
local_umask=022

# Maximum file size (0 = unlimited, adjust as needed)
# max_clients=0
# max_per_ip=0

# ──────────────────────────────────────────────────────────────────────
# LOGGING (enhanced for troubleshooting)
# ──────────────────────────────────────────────────────────────────────
# Enable transfer logging
xferlog_enable=YES
xferlog_std_format=YES
xferlog_file=/var/log/vsftpd.log

# Enable detailed protocol logging
log_ftp_protocol=YES

# Dual logging (both vsftpd.log and syslog)
dual_log_enable=YES
syslog_enable=NO

# ──────────────────────────────────────────────────────────────────────
# SECURITY SETTINGS
# ──────────────────────────────────────────────────────────────────────
# Hide user IDs in directory listings
hide_ids=YES

# Restrict users to their home directory
userlist_enable=NO
userlist_deny=NO

# Disable dangerous commands
cmds_allowed=ABOR,ACCT,ALLO,APPE,CWD,CDUP,DELE,EPRT,EPSV,FEAT,HELP,LIST,MDTM,MKD,MODE,NLST,NOOP,OPTS,PASS,PASV,PORT,PWD,QUIT,REIN,REST,RETR,RMD,RNFR,RNTO,SITE,SIZE,STAT,STOR,STOU,STRU,SYST,TYPE,USER,XCUP,XCWD,XMKD,XPWD,XRMD

# ──────────────────────────────────────────────────────────────────────
# PERFORMANCE & RELIABILITY
# ──────────────────────────────────────────────────────────────────────
# Use sendfile for better performance
use_sendfile=YES

# ASCII mode settings (disable for binary files like videos)
ascii_upload_enable=NO
ascii_download_enable=NO

# ──────────────────────────────────────────────────────────────────────
# CONNECTION LIMITS
# ──────────────────────────────────────────────────────────────────────
# Maximum number of clients
max_clients=50

# Maximum connections per IP
max_per_ip=5

# ──────────────────────────────────────────────────────────────────────
# SSL/TLS (optional - uncomment if you want encrypted transfers)
# ──────────────────────────────────────────────────────────────────────
# ssl_enable=YES
# rsa_cert_file=/etc/ssl/certs/vsftpd.pem
# rsa_private_key_file=/etc/ssl/private/vsftpd.pem
# allow_anon_ssl=NO
# force_local_data_ssl=NO
# force_local_logins_ssl=NO
# ssl_tlsv1=YES
# ssl_sslv2=NO
# ssl_sslv3=NO
# require_ssl_reuse=NO
# ssl_ciphers=HIGH

# ──────────────────────────────────────────────────────────────────────
# BANNER & MESSAGES
# ──────────────────────────────────────────────────────────────────────
ftpd_banner=Welcome to FTP Server

# ──────────────────────────────────────────────────────────────────────
# ADDITIONAL SECURITY
# ──────────────────────────────────────────────────────────────────────
# Prevent directory traversal
secure_chroot_dir=/var/run/vsftpd/empty

# Disable PORT command (force passive mode)
port_enable=YES

# ──────────────────────────────────────────────────────────────────────
# NOTES:
# ──────────────────────────────────────────────────────────────────────
# 1. Make sure firewall allows ports 21, 40000-40100
# 2. Check /var/log/vsftpd.log for transfer issues
# 3. Monitor file sizes after upload to verify completeness
# 4. Consider using SFTP for better integrity guarantees
# ──────────────────────────────────────────────────────────────────────

