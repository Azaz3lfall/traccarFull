name: Deploy to VPS

on:
  push:
    branches:
      - main   # change if you deploy from another branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Build frontend
        run: |
          npm install
          npm run build
          # your build output should be in dist/ or build/ – adjust accordingly

      - name: Deploy to VPS
        run: |
          # remove old web dir
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "rm -rf /opt/traccar/web"

          # create new web dir
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p /opt/traccar/web"

          # upload new build
          scp -i ~/.ssh/id_ed25519 -r ./build/* ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/traccar/web

          # restart traccar
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "sudo systemctl restart traccar"
