# Proxy reverso para o backend de Gestão de Frota (porta 3666)
# Inclua este bloco location dentro do server que serve o frontend (ex.: porta 3000 ou 80/443).
#
# Exemplo de uso dentro de um server { ... }:
#
#   include /caminho/para/nginx-gestao-proxy.conf;
#
# Ou copie o bloco location abaixo para o seu server block.

location /gestao {
    proxy_pass http://127.0.0.1:3666;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Se o backend Traccar também precisar de /app/motorista (app do motorista):
location /app/motorista {
    proxy_pass http://127.0.0.1:3666;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header Cookie $http_cookie;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

# Uploads servidos pelo gestao_backend
location /gestao/uploads {
    proxy_pass http://127.0.0.1:3666;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Cookie $http_cookie;
}
