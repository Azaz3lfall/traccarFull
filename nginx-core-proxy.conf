# Proxy reverso para o Core Fleet (porta 4000)
# Inclua ESTE arquivo ANTES do bloco location /api ou location / que vai para o Traccar.
# Os blocos mais específicos (/api/fleet, /api/vehicles, /api/clients) devem vir antes do genérico /api.
#
# Exemplo de uso no server block de rast.rastreadorautoram.com.br:
#
#   # Core Fleet - deve vir ANTES do proxy do Traccar /api
#   include /caminho/para/nginx-core-proxy.conf;
#
#   location /api {
#       proxy_pass http://127.0.0.1:8082;  # Traccar
#       ...
#   }

location /api/fleet {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
}

