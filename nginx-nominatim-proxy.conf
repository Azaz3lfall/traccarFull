# Proxy reverso para Nominatim (reverse geocoding)
# Inclua no server block de rast.rastreadorautoram.com.br
#
# O frontend chama /nominatim-proxy/reverse.php?lat=...&lon=...
# Este proxy remove o prefixo /nominatim-proxy e encaminha para o servidor Nominatim em 50.30.32.171:8080

location /nominatim-proxy/ {
    rewrite ^/nominatim-proxy/(.*)$ /$1 break;
    proxy_pass http://50.30.32.171:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
}
