<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="${colorPrimary}" />
    <meta name="description" content="${description}" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" sizes="180x180" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/styles.css">
    <title></title>
    <style>
      body {
        background-color: #1F2937;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      .loader {
        position: fixed; top: calc(50% - 60px); left: calc(50% - 100px);
        width: 200px; height: 120px; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .spinner {
        width: 50px; aspect-ratio: 1; box-sizing: content-box; animation: ll 1s infinite linear;
        border-radius: 50%; border: 8px solid transparent; border-right-color: #18a9fd;
        margin-bottom: 20px;
      }
      .progress-container {
        width: 180px; height: 4px; background-color: rgba(255, 255, 255, 0.2);
        border-radius: 2px; overflow: hidden; margin-bottom: 8px;
      }
      .progress-bar {
        height: 100%; background-color: #18a9fd; width: 0%;
        transition: width 0.3s ease; border-radius: 2px;
      }
      .progress-text {
        color: white; font-size: 14px; font-weight: 500;
        text-align: center; margin: 0;
      }
      @keyframes ll {to{transform: rotate(1turn)}}
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to use <a href="https://www.traccar.org/">Traccar GPS Tracking System</a>.</noscript>
    <div id="root" class="root"></div>
    <div class="loader">
      <div class="spinner"></div>
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">Loading...</p>
    </div>
    <script type="module" src="/src/index.jsx" onerror="alert('Loading error.')"></script>
  </body>
</html>
